<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeedTrak - Cadastro</title>
  <link rel="stylesheet" href="/css/cadastro.css">
</head>
<body>

  <div class="container">

    <h1>Cadastro</h1>

    <form class="form">

      <div class="input-box">
        <label>Nome</label>
        <input type="text" />
      </div>

      <div class="input-box">
        <label>Email</label>
        <input type="email" />
      </div>

      <div class="input-box">
        <label>Senha</label>
        <input type="password" />
      </div>

      <button class="btn">Cadastrar</button>

    </form>

    <p class="footer">
      Já tem conta?
      <a href="/telas/entrar.html">Clique Aqui</a>
      para Entrar
    </p>

  </div>

</body>
</html>
