<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeedTrak - Entrar</title>
  <link rel="stylesheet" href="/css/entrar.css" />
</head>
<body>

  <div class="container">

    <h1>Entrar</h1>

    <form class="form">

      <div class="input-box">
        <label>Email</label>
        <input type="email" />
      </div>

      <div class="input-box">
        <label>Senha</label>
        <input type="password" />
      </div>

      <button class="btn">Entrar</button>

    </form>

    <p class="footer">
      Você não possui conta?
      <a href="/telas/cadastro.html">Clique Aqui</a> para Cadastrar
    </p>

    <button class="forgot-btn">Esqueci a senha</button>

  </div>

</body>
</html>
